<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="bc"><circle cx="50" cy="50" r="46"/></clipPath>
  </defs>
  <!-- White ball with black border -->
  <circle cx="50" cy="50" r="48" fill="#fff" stroke="#111" stroke-width="4"/>
  <!-- Classic football patch pattern -->
  <g fill="#111" clip-path="url(#bc)">
    <!-- Center pentagon (pointing up) -->
    <polygon points="50,35 64,45 59,62 41,62 36,45"/>
    <!-- Top outer pentagon -->
    <polygon points="50,31 41,25 45,15 55,15 59,25"/>
    <!-- Upper-right outer pentagon -->
    <polygon points="85,39 82,49 71,49 68,39 77,32"/>
    <!-- Lower-right outer pentagon -->
    <polygon points="72,80 61,80 58,70 67,64 75,70"/>
    <!-- Lower-left outer pentagon -->
    <polygon points="28,80 25,70 34,64 42,70 39,80"/>
    <!-- Upper-left outer pentagon -->
    <polygon points="15,39 23,32 32,39 29,49 18,49"/>
  </g>
</svg>
