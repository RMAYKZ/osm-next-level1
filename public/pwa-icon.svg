<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="75%">
      <stop offset="0%"   stop-color="#141a35"/>
      <stop offset="100%" stop-color="#06060e"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6b96f8"/>
      <stop offset="100%" stop-color="#8b64f0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Subtle field ambient glow -->
  <ellipse cx="50" cy="50" rx="36" ry="30" fill="rgba(91,138,247,0.07)"/>

  <!-- Pitch lines -->
  <g filter="url(#glow)" stroke="url(#line)" fill="none">
    <!-- Outer border -->
    <rect x="16" y="10" width="68" height="80" rx="3" stroke-width="3.2" stroke-opacity="0.95"/>
    <!-- Halfway line -->
    <line x1="16" y1="50" x2="84" y2="50" stroke-width="2.2" stroke-opacity="0.85"/>
    <!-- Centre circle -->
    <circle cx="50" cy="50" r="13" stroke-width="2.2" stroke-opacity="0.85"/>
    <!-- Top penalty box -->
    <rect x="31" y="10" width="38" height="18" rx="1" stroke-width="1.6" stroke-opacity="0.5"/>
    <!-- Bottom penalty box -->
    <rect x="31" y="72" width="38" height="18" rx="1" stroke-width="1.6" stroke-opacity="0.5"/>
  </g>

  <!-- Centre spot -->
  <circle cx="50" cy="50" r="4" fill="#6b96f8"/>
  <!-- Penalty spots -->
  <circle cx="50" cy="22" r="2.2" fill="#8b64f0" fill-opacity="0.72"/>
  <circle cx="50" cy="78" r="2.2" fill="#8b64f0" fill-opacity="0.72"/>
</svg>
